name: itemdef-steam

# Headless first-party itemdef enrichment, straight from Steam (no Steam client).
# s&box skins are Steam Inventory Service items (appid 590830). tools/itemdef-worker
# logs in via SteamKit2 with a dedicated account's refresh token, pulls the itemdef
# catalog (rarity, rarityColor, itemDefinitionId, ...) and POSTs it to
# /api/admin/enrich-from-steam. Steam is NOT behind Cloudflare, so this runs fine
# from a GitHub runner IP (unlike sbox.dev).
#
# Manual-only until the secrets below are set and the first run is green; then add
# a `schedule:` trigger (rarity is near-static, daily is plenty).
#
# Required repo secrets:
#   STEAM_ACCOUNT        - the dedicated Steam account name
#   STEAM_REFRESH_TOKEN  - minted by `dotnet run -- login` (see tools/itemdef-worker/README.md)
#   SBOXSKINS_ADMIN_KEY  - the site's ANALYTICS_KEY (already set for enrich-sbox.yml)

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC — rarity/catalog are near-static, daily is plenty
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Run itemdef worker
        working-directory: tools/itemdef-worker
        env:
          STEAM_ACCOUNT: ${{ secrets.STEAM_ACCOUNT }}
          STEAM_REFRESH_TOKEN: ${{ secrets.STEAM_REFRESH_TOKEN }}
          SBOXSKINS_ADMIN_KEY: ${{ secrets.SBOXSKINS_ADMIN_KEY }}
          SITE_URL: https://sboxskins.gg
        run: dotnet run -c Release
