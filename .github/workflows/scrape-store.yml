name: Scrape S&box Store Availability

on:
  # Scheduled cron disabled — the in-game shop now sits behind a Steam login
  # wall, so the unauthenticated headless scrape only ever sees the
  # "Log in with Steam" page. Store availability is sourced from the sbox.dev
  # API sync instead (Item.isActiveStoreItem drives /store and is mirrored to
  # the legacy storeStatus column). Kept as workflow_dispatch so we can still
  # run it manually if sbox.game ever exposes an unauthenticated catalog again.
  # schedule:
  #   - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't update database)"
        required: false
        default: "false"
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run store scraper
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYED_URL: ${{ secrets.DEPLOYED_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          npx tsx scripts/scrape-store.ts $ARGS
