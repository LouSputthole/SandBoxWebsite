name: enrich-sbox

# Enrich items with sbox.dev data (supply, owners, category, scarcity).
#
# Runs here instead of the Vercel cron because api.sbox.dev is behind
# Cloudflare, which 403s Vercel's datacenter IPs (but allows GitHub
# runner IPs). The script fetches sbox.dev and POSTs to the site's
# /api/admin/enrich-items endpoint. Daily is plenty for supply data.
#
# Requires repo secret: SBOXSKINS_ADMIN_KEY = the site's ANALYTICS_KEY.

on:
  schedule:
    - cron: "0 8 * * *" # daily, 08:00 UTC
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enrich items from sbox.dev
        env:
          SBOXSKINS_ADMIN_KEY: ${{ secrets.SBOXSKINS_ADMIN_KEY }}
          SITE_URL: https://sboxskins.gg
        run: node scripts/enrich-from-sbox.mjs
