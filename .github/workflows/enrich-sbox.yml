name: discover-enrich-sbox

# Discover new S&box skins + enrich existing ones from sbox.dev.
#
# Runs here instead of the Vercel cron because sbox.dev is behind Cloudflare,
# which 403s Vercel's datacenter IPs (but allows GitHub runner IPs + a browser
# UA). The script reads sbox.dev/sitemap-skins.xml for the full catalog, fetches
# each per-skin payload, and POSTs to /api/admin/enrich-items, which UPDATES
# known items and CREATES ones we don't have yet (new store items + drops).
# Hourly so new drops land on the site within ~1h.
#
# Requires repo secret: SBOXSKINS_ADMIN_KEY = the site's ANALYTICS_KEY.

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:
    inputs:
      announce:
        description: "Tweet genuinely-new drops (set false for a backfill)"
        type: boolean
        default: true

jobs:
  discover-enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Discover + enrich from sbox.dev
        env:
          SBOXSKINS_ADMIN_KEY: ${{ secrets.SBOXSKINS_ADMIN_KEY }}
          SITE_URL: https://sboxskins.gg
          # Scheduled runs announce; workflow_dispatch honors the input.
          SBOX_ANNOUNCE: ${{ github.event.inputs.announce || 'true' }}
        run: node scripts/discover-from-sbox.mjs
